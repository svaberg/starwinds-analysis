[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "starwinds_analysis"
version = "0.1.0"
description = "Analysis tools for SWMF/BATSRUS output"
readme = "README.md"
requires-python = ">=3.10"
authors = [
  { name = "Dagfinn Evensen" },
]
dependencies = [
  "numpy",
  "scipy",
  "matplotlib",
  "starwinds_readplt @ git+https://github.com/svaberg/starwinds-readplt",
]

[project.optional-dependencies]
viz3d = [
  "pyvista",
]
tests = [
  "pytest",
  "pytest-console-scripts",
  "pytest-cov",
  "nbmake",
  "nbstripout",
  "ipykernel",
]
dev = [
  "nbmake",
  "nbstripout",
  "ipykernel",
]

[project.urls]
Repository = "https://github.com/yourorg/starwinds-analysis"
Issues = "https://github.com/yourorg/starwinds-analysis/issues"

[project.scripts]
sw-pipe = "starwinds_analysis.pipelines.sw_pipe:main"
sw-pipe-results = "starwinds_analysis.pipelines.sw_pipe_results:main"

[tool.setuptools.packages.find]
include = ["starwinds_analysis*"]
namespaces = true

[tool.pytest.ini_options]
markers = [
  "design_lockin: tests that primarily lock in current implementation details or schema/log formatting rather than core functionality",
  "interactive: tests requiring user interaction / graphics",
]
