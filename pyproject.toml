[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "batwind"
version = "0.1.0"
description = "Analysis tools for SWMF/BATSRUS output"
readme = "README.md"
requires-python = ">=3.10"
authors = [
  { name = "Dagfinn Evensen" },
]
dependencies = [
  "numpy",
  "numba",
  "scipy",
  "matplotlib",
  "griblet @ git+https://github.com/svaberg/griblet.git",
  "starwinds_readplt @ git+https://github.com/svaberg/starwinds-readplt",
]

[project.optional-dependencies]
viz3d = [
  "pyvista",
]
tests = [
  "pytest",
  "pytest-console-scripts",
  "pytest-cov",
  "nbmake",
  "nbstripout",
  "ipykernel",
]
dev = [
  "nbmake",
  "nbstripout",
  "ipykernel",
]

[project.urls]
Repository = "https://github.com/svaberg/batwind"
Issues = "https://github.com/svaberg/batwind/issues"

[project.scripts]
batwind-pipe = "batwind.pipelines.batwind_pipe:main"
batwind-pipe-results = "batwind.pipelines.batwind_pipe_results:main"

[tool.setuptools.packages.find]
include = ["batwind*"]
namespaces = true

[tool.pytest.ini_options]
addopts = "-m 'not slow'"
markers = [
  "slow: expensive tests excluded from the default unit-test run",
  "design_lockin: tests that primarily lock in current implementation details or schema/log formatting rather than core functionality",
  "interactive: tests requiring user interaction / graphics",
]
