name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
      MPLBACKEND: Agg
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Restore pooch cache
        uses: actions/cache@v4
        with:
          path: ${{ env.XDG_CACHE_HOME }}/pooch
          key: pooch-${{ runner.os }}-${{ hashFiles('batwind/data/samples.py') }}
          restore-keys: |
            pooch-${{ runner.os }}-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --editable .[tests]
      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Test with pytest
        run: |
          pytest --cov=batwind
          pytest --cov=batwind --cov-report=xml:pytest-cobertura.xml
      - name: Upload coverage to Codacy
        if: ${{ env.CODACY_PROJECT_TOKEN != '' }}
        run: |
          bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r pytest-cobertura.xml
